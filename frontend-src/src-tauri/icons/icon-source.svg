<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- App background: deep space -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#060612"/>
    </linearGradient>

    <!-- Outer glow halo around orb -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb surface gradient: violet core → cyan edge -->
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#e0d4ff"/>
      <stop offset="30%"  stop-color="#a78bfa"/>
      <stop offset="65%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>

    <!-- Specular highlight on orb -->
    <radialGradient id="shine" cx="35%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.60)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Rim light on bottom-right of orb (cyan bounce light) -->
    <radialGradient id="rim" cx="72%" cy="75%" r="45%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="210" ry="210" fill="url(#bg)"/>

  <!-- Outer ambient glow (large soft halo) -->
  <circle cx="512" cy="512" r="370" fill="url(#halo)"/>

  <!-- Pulse ring 1 — faint outer -->
  <circle cx="512" cy="512" r="300"
          fill="none"
          stroke="rgba(139,92,246,0.18)"
          stroke-width="1.5"/>

  <!-- Pulse ring 2 — slightly stronger inner -->
  <circle cx="512" cy="512" r="248"
          fill="none"
          stroke="rgba(167,139,250,0.28)"
          stroke-width="1"/>

  <!-- Orb body -->
  <circle cx="512" cy="512" r="195" fill="url(#orb)"/>

  <!-- Rim light overlay -->
  <circle cx="512" cy="512" r="195" fill="url(#rim)"/>

  <!-- Specular highlight -->
  <circle cx="512" cy="512" r="195" fill="url(#shine)"/>

  <!-- Small bright core dot — sense of depth -->
  <circle cx="468" cy="448" r="28" fill="rgba(255,255,255,0.55)"/>
  <circle cx="468" cy="448" r="14" fill="rgba(255,255,255,0.85)"/>
</svg>
